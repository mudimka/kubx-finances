<div class="sp-field">
    <textarea class="sp-quote" placeholder="">{{!it.value}}</textarea>
    <span>Цитируемый: </span><input class="sp-quote-whose" type="text" placeholder="" value="{{!it.whose}}">
    <span>Должность: </span><input class="sp-quote-position" type="text" placeholder="" value="{{!it.position}}">
</div>

<div class="sp-rel">
    <div class="sp-source sp-clear">
        <input class="sp-download-url" type="text" placeholder="Скачать изображение по ссылке">
        <span class="sp-note">или</span>
        <div class="sp-x-btn sp-x-btn-file">
            <label>Загрузить</label>
            <input type="file" name="file">
        </div>
    </div>
    <div class="sp-edit sp-clear">
        <span class="sp-x-btn sp-item-del">Удалить</span>
    </div>
    <div class="sp-result sp-clear"></div>
</div>
